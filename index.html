<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rodrigopanel - Productos de Limpieza</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
        }
        header {
            background: #111;
            padding: 15px;
            text-align: center;
        }
        header h1 {
            margin: 0;
            color: #00ffcc;
        }
        nav {
            text-align: center;
            padding: 10px;
            background: #222;
        }
        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }
        .hero {
            text-align: center;
            padding: 50px 20px;
        }
        .productos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .producto {
            background: #111;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .producto img {
            width: 100%;
            border-radius: 10px;
        }
        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background: #00ffcc;
            color: black;
            text-decoration: none;
            border-radius: 5px;
        }
        footer {
            text-align: center;
            padding: 15px;
            background: #111;
        }
    </style>
</head>
<body>

<header>
    <h1>Rodrigopanel</h1>
    <p>Productos de Limpieza de Calidad</p>
</header>

<nav>
    <a href="#">Inicio</a>
    <a href="#">Productos</a>
    <a href="#">Contacto</a>
</nav>

<section class="hero">
    <h2>¡Limpieza profesional para tu hogar y negocio!</h2>
    <p>Los mejores productos al mejor precio</p>
</section>

<section class="productos">
    <div class="producto">
        <img src="" alt="Producto 1">
        <h3>Detergente</h3>
        <p>S/ 10.00</p>
        <a href="#" class="btn">Comprar</a>
    </div>

    <div class="producto">
        <img src="https://via.placeholder.com/200" alt="Producto 2">
        <h3>Lejía</h3>
        <p>S/ 5.00</p>
        <a href="#" class="btn">Comprar</a>
    </div>

    <div class="producto">
        <img src="https://via.placeholder.com/200" alt="Producto 3">
        <h3>Desinfectante</h3>
        <p>S/ 8.00</p>
        <a href="#" class="btn">Comprar</a>
    </div>
</section>

<footer>
    <p>Contacto: 999 999 999 | Lima, Perú</p>
</footer>

</body>
</html>
